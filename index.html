<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan de Test de Usabilidad - Analiza y mejora la experiencia de tus usuarios." />
    <title>Usability Test Planner | IHC</title>
    <!-- Preconnect a Google Fonts para acelerar el LCP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  </head>
  <body>
    <div id="root">
      <!-- Spinner inicial para mejorar FCP y LCP percibido -->
      <div id="initial-loader" style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #f0f4f8; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #003366; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <p style="margin-top: 15px; color: #475569; font-weight: 600;">Cargando experiencia...</p>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
